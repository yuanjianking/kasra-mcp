# IAC-04: K8s Workload Security — privileged container
# Test: TC-IAC-006
apiVersion: v1
kind: Pod
metadata:
  name: privileged-pod
spec:
  hostNetwork: true
  containers:
  - name: app
    image: myapp:latest
    securityContext:
      privileged: true
      allowPrivilegeEscalation: true
      runAsNonRoot: false
