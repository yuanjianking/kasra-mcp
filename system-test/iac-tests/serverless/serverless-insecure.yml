# IAC-15: Serverless Framework Security — wildcard IAM, no auth
# Test: TC-IAC-018
service: my-insecure-service

provider:
  name: aws
  runtime: python3.11
  iamRoleStatements:
    - Effect: Allow
      Action: "*"
      Resource: "*"

functions:
  hello:
    handler: handler.hello
    events:
      - http:
          path: hello
          method: get
          auth: NONE
