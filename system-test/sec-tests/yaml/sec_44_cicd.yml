# SEC-44: CI/CD Attack Surface
# Test: TC-CR-048
name: Deploy Workflow
on:
  push:
    branches: [main]

permissions: write-all  # Overly permissive

jobs:
  deploy:
    runs-on: self-hosted  # Self-hosted runner — may not be isolated
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to production
        run: |
          npm install
          npm run deploy
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Debug
        run: |
          cat /etc/passwd
          env
